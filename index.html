<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/movement-metrix/favicon.svg" />
    <!-- viewport-fit=cover lets the page paint into the notch/home-indicator area
         once the browser chrome is gone. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- Launches without Safari's address bar when added to the home screen.
         iOS reads the apple- prefixed tag; the unprefixed one is the standard. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Movement" />
    <meta name="theme-color" content="#000000" />

    <link rel="manifest" href="/movement-metrix/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/movement-metrix/apple-touch-icon.png" />

    <title>Movement</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
